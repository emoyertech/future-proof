<!DOCTYPE html>
<html>
<head>
    <title>letgo</title>
    <style>
        :root { --red: #ff5a5f; }
        body { font-family: sans-serif; margin: 0; padding: 0; }
        .navbar { background: white; padding: 15px 5%; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .logo { color: var(--red); font-size: 32px; font-weight: 900; text-decoration: none; }
        .container { display: flex; max-width: 1200px; margin: 0 auto; padding: 20px; gap: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/" class="logo">letgo</a>
        <div>{% if session.username %}{{ session.username }} | <a href="/logout">Logout</a>{% endif %}</div>
    </div>
    <div class="container">
        {% block main %}
            {% block main_content %}
                {% block content %}{% endblock %}
            {% endblock %}
        {% endblock %}
    </div>
</body>
</html>
