{% extends "layout.html" %}

{% block main %}
<div style="background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
    <h1 style="color: var(--primary); margin-bottom: 10px;">Create Account</h1>
    <p style="color: #606770; margin-bottom: 25px;">Join the marketplace today.</p>
    
    <!-- Error message if username is taken -->
    {% if error %}
    <p style="color: var(--danger); font-weight: bold;">{{ error }}</p>
    {% endif %}

    <form action="/register" method="POST">
        <input type="text" name="username" class="input" placeholder="Choose a Username" required>
        
        <div style="position: relative;">
            <input type="password" id="reg-pwd" name="password" class="input" placeholder="Create a Password" required>
            <span onclick="togglePwd('reg-pwd')" style="position: absolute; right: 10px; top: 12px; cursor: pointer; color: var(--primary); font-size: 12px;">👁️ Show</span>
        </div>
        
        <button type="submit" class="btn" style="width: 100%; font-size: 18px; padding: 12px;">Sign Up</button>
    </form>
    
    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #dadde1;">
    <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: bold;">Already have an account? Log In</a>
</div>

<script>
    function togglePwd(id) {
        var x = document.getElementById(id);
        x.type = (x.type === "password") ? "text" : "password";
    }
</script>
{% endblock %}
